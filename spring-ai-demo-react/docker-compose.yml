version: '3.8'

services:
  spring-ai-demo-react:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - spring-ai-demo
    environment:
      - REACT_APP_API_URL=http://localhost:8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  spring-ai-demo:
    build:
      context: ../SpringAiDemo
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - MY_APP_KEY=${MY_APP_KEY}
      - JAVA_OPTS=-Xmx512m -Xms256m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
